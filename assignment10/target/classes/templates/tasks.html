<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Employee Task Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <i class="ph ph-kanban"></i> FacultyTasks
        </a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/employees">Faculty Members</a>
            <a href="/tasks" class="active">Task Assignments</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Task Assignments</h1>
        </div>

        <div class="split-layout">
            <!-- Tasks Table Section -->
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Task Details</th>
                            <th>Assignee</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="task : ${tasks}">
                            <td>
                                <strong th:text="${task.title}">Exam Duty</strong>
                                <div style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem;" th:text="${task.description}">Supervise hall 4.</div>
                            </td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <div style="width: 32px; height: 32px; border-radius: 50%; background-color: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                                        <span th:text="${#strings.substring(task.assignee.name, 0, 1)}">A</span>
                                    </div>
                                    <span th:text="${task.assignee.name}">Alan Turing</span>
                                </div>
                            </td>
                            <td th:text="${task.dueDate}">2026-05-15</td>
                            <td>
                                <span th:if="${task.status == 'PENDING'}" class="badge badge-pending">Pending</span>
                                <span th:if="${task.status == 'IN_PROGRESS'}" class="badge badge-progress">In Progress</span>
                                <span th:if="${task.status == 'COMPLETED'}" class="badge badge-completed">Completed</span>
                            </td>
                            <td>
                                <div style="display: flex; gap: 0.5rem;">
                                    <form th:if="${task.status != 'COMPLETED'}" th:action="@{/tasks/{id}/status(id=${task.id})}" method="post">
                                        <input type="hidden" name="status" th:value="${task.status == 'PENDING' ? 'IN_PROGRESS' : 'COMPLETED'}">
                                        <button type="submit" class="btn btn-success" style="padding: 0.35rem 0.75rem; font-size: 0.8rem;">
                                            <i class="ph ph-check"></i> Advance
                                        </button>
                                    </form>
                                    <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post">
                                        <button type="submit" class="btn btn-danger" style="padding: 0.35rem 0.75rem; font-size: 0.8rem;" onclick="return confirm('Delete this task?');">
                                            <i class="ph ph-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(tasks)}">
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">No tasks assigned yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- New Task Form Section -->
            <div class="card">
                <h2 style="margin-bottom: 1.5rem;">Assign New Task</h2>
                <form th:action="@{/tasks}" th:object="${newTask}" method="post">
                    <div class="form-group">
                        <label class="form-label">Task Title</label>
                        <input type="text" class="form-control" th:field="*{title}" required placeholder="e.g., Mid-term Exam Invigilation">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Description (Optional)</label>
                        <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Provide details about the task..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Assign To</label>
                        <select class="form-control" name="employeeId" required>
                            <option value="">Select Faculty Member</option>
                            <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name} + ' (' + ${emp.department} + ')'"></option>
                        </select>
                        <div th:if="${#lists.isEmpty(employees)}" style="color: #EF4444; font-size: 0.85rem; margin-top: 0.5rem;">
                            <i class="ph ph-warning-circle"></i> Please add faculty members first.
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Due Date</label>
                        <input type="date" class="form-control" th:field="*{dueDate}" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;" th:disabled="${#lists.isEmpty(employees)}">
                        <i class="ph ph-paper-plane-right"></i> Assign Task
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
